name: Blender CLI Image Render via Gdown

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  render_scene:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Install Gdown
      run: |
        python -m pip install --upgrade pip
        pip install gdown

    - name: Download Blend File from Google Drive
      run: |
        gdown 1wiKV9ffh4BdynmyQuWsw11LrEwJfCz7D
    - name: Install Blender
      run: |
        sudo apt-get update
        sudo apt-get install -y blender

    - name: Execute Background Render
      run: |
        blender -b "AEPBR_Beta_1.0.blend" -E CYCLES -o "//render_output_" -F PNG -f 1 -- --cycles-device CPU
        
    - name: Upload Rendered Artifact
      uses: actions/upload-artifact@v4
      with:
        name: rendered-image
        path: render_output_0001.png
